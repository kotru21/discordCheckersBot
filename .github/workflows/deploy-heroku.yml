name: Deploy Heroku

on:
  push:
    branches: [main]

concurrency:
  group: deploy-heroku
  cancel-in-progress: false

jobs:
  check:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy server to Heroku
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/discord-checkers-server.git"
          git push heroku HEAD:main
